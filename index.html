<head>

    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@100;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #0a0f1d;
            --bg-card: #161b2c;
            --primary: #fb7185;
            --primary-dark: #e11d48;
            --accent: #38bdf8;
            --text-main: #f9fafb;
            --text-dim: #94a3b8;
            --border: #2d3748;
            --danger: #ef4444;
            --success: #10b981;
        }

        /* 기본 레이아웃 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-page); color: var(--text-main); display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }

        .app-container { width: 100%; max-width: 480px; padding: env(safe-area-inset-top) 20px 40px; display: flex; flex-direction: column; }

        .header { text-align: center; padding: 25px 0 10px; }
        .logo { font-weight: 800; font-size: 1.8rem; letter-spacing: -1px; }
        .logo span { color: var(--primary); }

        /* 입력/수정 카드 */
        .input-card {
            background: var(--bg-card); border-radius: 25px; padding: 22px;
            border: 1px solid var(--border); margin-bottom: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }
        .input-card.edit-mode { border-color: var(--primary); box-shadow: 0 0 15px rgba(251, 113, 133, 0.3); }

        .input-group { display: flex; flex-direction: column; gap: 12px; }
        label { font-size: 0.8rem; color: var(--text-dim); font-weight: 700; margin-left: 5px; }
        input {
            background: #1e293b; border: 1px solid var(--border); padding: 15px;
            border-radius: 14px; color: white; outline: none; font-size: 1rem;
        }
        input:focus { border-color: var(--primary); }
        
        .btn-main {
            background: var(--primary); color: white; border: none; padding: 16px;
            border-radius: 14px; font-weight: 800; font-size: 1rem; cursor: pointer;
            box-shadow: 0 4px 12px rgba(251, 113, 133, 0.3);
        }
        .btn-main.edit { background: var(--primary-dark); }

        /* 리스트 영역 */
        .list-title { font-size: 1.1rem; font-weight: 800; color: var(--primary); margin: 20px 0 15px 5px; }
        .dday-list { display: flex; flex-direction: column; gap: 15px; }

        .dday-item {
            background: var(--bg-card); border-radius: 22px; padding: 18px;
            border: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px;
        }
        .item-top { display: flex; justify-content: space-between; align-items: center; }
        .dday-info { display: flex; flex-direction: column; gap: 4px; }
        .dday-name { font-size: 1.1rem; font-weight: 700; color: var(--text-main); }
        .dday-date { font-size: 0.85rem; color: var(--text-dim); }

        .dday-counter {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; padding: 8px 18px; border-radius: 12px;
            font-size: 1.2rem; font-weight: 800; min-width: 85px; text-align: center;
        }
        .dday-counter.today { background: var(--accent); color: #000; }
        .dday-counter.passed { background: #334155; color: var(--text-dim); box-shadow: none; }

        .item-controls { display: flex; gap: 10px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px; }
        .control-btn { 
            flex: 1; border: none; background: rgba(255,255,255,0.03); color: var(--text-dim); 
            font-size: 0.85rem; cursor: pointer; padding: 8px; border-radius: 8px;
        }
        .empty-state { text-align: center; padding: 50px 0; color: var(--text-dim); font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <div class="logo">Roayou<span>Edu</span></div>
        </header>

        <section class="input-card" id="inputCard">
            <div class="input-group">
                <div>
                    <label id="inputLabel">새 프로젝트 추가</label>
                    <input type="text" id="titleInput" placeholder="예: 모텔 리모델링 완료">
                </div>
                <div>
                    <label>목표 날짜</label>
                    <input type="date" id="dateInput">
                </div>
                <button class="btn-main" id="submitBtn" onclick="handleSubmit()">일정 추가하기</button>
            </div>
        </section>

        <section>
            <h2 class="list-title">📌 관리 일정</h2>
            <div id="ddayList" class="dday-list"></div>
        </section>
    </div>

    <script>
        const STORAGE_KEY = 'roayou_pwa_v1';
        let ddays = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let editIndex = -1;

        function calculateDDay(targetDate) {
            const today = new Date(); today.setHours(0,0,0,0);
            const target = new Date(targetDate); target.setHours(0,0,0,0);
            const diffDays = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
            if (diffDays === 0) return { text: "Today", class: "today" };
            if (diffDays > 0) return { text: `D-${diffDays}`, class: "future" };
            return { text: `D+${Math.abs(diffDays)}`, class: "passed" };
        }

        function renderDDays() {
            const list = document.getElementById('ddayList');
            list.innerHTML = ddays.length ? '' : '<div class="empty-state">중요한 프로젝트를 등록해 보세요!</div>';
            ddays.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach((item, idx) => {
                const res = calculateDDay(item.date);
                list.innerHTML += `
                    <div class="dday-item">
                        <div class="item-top">
                            <div class="dday-info"><span class="dday-name">${item.title}</span><span class="dday-date">📅 ${item.date}</span></div>
                            <div class="dday-counter ${res.class}">${res.text}</div>
                        </div>
                        <div class="item-controls">
                            <button class="control-btn" onclick="startEdit(${idx})">📝 수정</button>
                            <button class="control-btn" onclick="deleteDDay(${idx})">🗑️ 삭제</button>
                        </div>
                    </div>`;
            });
        }

        function handleSubmit() {
            const title = document.getElementById('titleInput').value.trim();
            const date = document.getElementById('dateInput').value;
            if (!title || !date) return;
            if (editIndex === -1) ddays.push({title, date});
            else { ddays[editIndex] = {title, date}; exitEditMode(); }
            localStorage.setItem(STORAGE_KEY, JSON.stringify(ddays));
            renderDDays();
            document.getElementById('titleInput').value = '';
            document.getElementById('dateInput').value = '';
        }

        function startEdit(idx) {
            editIndex = idx;
            document.getElementById('titleInput').value = ddays[idx].title;
            document.getElementById('dateInput').value = ddays[idx].date;
            document.getElementById('inputCard').classList.add('edit-mode');
            document.getElementById('submitBtn').textContent = "저장하기";
            document.getElementById('submitBtn').classList.add('edit');
            window.scrollTo({top:0, behavior:'smooth'});
        }

        function exitEditMode() {
            editIndex = -1;
            document.getElementById('inputCard').classList.remove('edit-mode');
            document.getElementById('submitBtn').textContent = "일정 추가하기";
            document.getElementById('submitBtn').classList.remove('edit');
        }

        function deleteDDay(idx) {
            if(confirm("삭제할까요?")) { ddays.splice(idx,1); localStorage.setItem(STORAGE_KEY, JSON.stringify(ddays)); renderDDays(); }
        }

        renderDDays();
    </script>
</body>
</html>
